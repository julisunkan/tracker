<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdBlock Pro – Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #e63946;
    --accent2: #2b6cb0;
    --bg: #1a0e08;
    --surface: #231408;
    --surface2: #2e1a0e;
    --border: rgba(246,201,14,0.09);
    --text: #f5e6d3;
    --text-dim: #b8896a;
    --text-muted: #6b4c35;
  }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 40px 20px;
  }
  .hero {
    text-align: center;
  }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 32px rgba(230,57,70,0.4);
    margin: 0 auto 20px;
  }
  .logo-icon svg { width: 34px; height: 34px; }
  h1 { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: var(--text-dim); font-family: 'DM Mono', monospace; }
  .cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
    width: 220px;
  }
  .card:hover {
    border-color: rgba(230,57,70,0.4);
    background: var(--surface2);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  }
  .card-icon { font-size: 36px; margin-bottom: 12px; }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .card-desc { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .badge {
    display: inline-block;
    background: rgba(230,57,70,0.12);
    border: 1px solid rgba(230,57,70,0.3);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-top: 20px;
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0d0f14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L3 7l1.5 9L12 22l7.5-6L21 7z"/>
        <line x1="12" y1="2" x2="12" y2="22"/>
      </svg>
    </div>
    <h1>AdBlock Pro</h1>
    <div class="subtitle">Chrome Extension · Manifest V3 · Ad Blocker &amp; Privacy</div>
    <div class="badge">✓ 48,000+ Filter Rules</div>
  </div>

  <div class="cards">
    <a href="/popup-ui.html" class="card">
      <div class="card-icon">🛡️</div>
      <div class="card-title">Popup UI</div>
      <div class="card-desc">Extension toolbar popup with per-site controls</div>
    </a>
    <a href="/options.html" class="card">
      <div class="card-icon">⚙️</div>
      <div class="card-title">Options Page</div>
      <div class="card-desc">Full settings panel with filter lists &amp; stats</div>
    </a>
  </div>
</body>
</html>
